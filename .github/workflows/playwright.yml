name: 🎭 Playwright Tests

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    paths:
      - "@caravan-kidstec/web/**"
      - "bun.lock"
      - "package.json"
  push:
    paths:
      - "@caravan-kidstec/web/**"
      - "bun.lock"
      - "package.json"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: chromium
            browser: chromium
            name: chromium
          - project: firefox
            browser: firefox
            name: firefox
          - project: webkit
            browser: webkit
            name: webkit
          - project: Mobile Chrome
            browser: chromium
            name: mobile-chrome
          - project: Mobile Safari
            browser: webkit
            name: mobile-safari

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          ref: ${{ env.SHA }}
        env:
          SHA: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: 🐣 Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: canary

      - name: 📦 Install dependencies
        run: bun i

      - name: 🧩 Build app
        working-directory: "@caravan-kidstec/web"
        run: bun run build

      - name: 🎭 Install Playwright Browsers
        working-directory: "@caravan-kidstec/web"
        run: bun playwright install --with-deps ${{ matrix.browser }}

      - name: 🧪 Run Playwright tests
        working-directory: "@caravan-kidstec/web"
        run: bun playwright test --project="${{ matrix.project }}"

      - name: 🆙 Upload Test Report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-${{ matrix.name }}
          path: "@caravan-kidstec/web/playwright-report/"
          retention-days: 30
