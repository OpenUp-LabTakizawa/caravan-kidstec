name: 🧪 Test

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    paths:
      - "@caravan-kidstec/web/**"
      - ".dockerignore"
      - "bun.lock"
      - "Dockerfile"
      - "package.json"
  push:
    paths:
      - "@caravan-kidstec/web/**"
      - ".dockerignore"
      - "bun.lock"
      - "Dockerfile"
      - "package.json"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    outputs:
      is_success: ${{ steps.test.outputs.is_success }}
      test_log: ${{ steps.test.outputs.test_log }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: 🐣 Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: canary

      - name: 📦 Install dependencies
        run: bun i

      - name: 🧪 Test app
        id: test
        run: |
          bun test:app &> >(tee -p test.log) || STATUS=$?
          if [ $STATUS -ne 0 ]; then
            echo "is_success=false" >> $GITHUB_OUTPUT
          else
            echo "is_success=true" >> $GITHUB_OUTPUT
          fi
          UUID=$(uuidgen)
          {
            echo "test_log<<EOF_$UUID"
            cat test.log
            echo "EOF_$UUID"
          } >> $GITHUB_OUTPUT

      - name: 💔 Fail if test failed
        if: steps.test.outputs.is_success == 'false'
        run: exit 1

  upload:
    runs-on: ubuntu-latest
    needs: test
    if: (success() || failure()) && github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/upload-pr-comment
        with:
          is_success: ${{ needs.test.outputs.is_success }}
          success_title: >-
            Test Passed
          success_body: >-
            Failed tests were fixed.
          failure_title: >-
            Test Failed
          failure_body: >-
            @${{ github.actor }}, your commit ${{ github.event.pull_request.head.sha }} failed the test.


            <details>

            <summary><strong>Test Log</strong></summary>


            ```shell

            ${{ needs.test.outputs.test_log }}

            ```


            </details>


            👀[View in Actions](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
          workflow_file: test.yml
