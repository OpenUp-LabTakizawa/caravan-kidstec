[tools]
bun = "latest"
rumdl = "latest"
pitchfork = "latest"

[tasks.lint]
run = ["bun lint:fix --unsafe", "mise lint:md"]

[tasks."lint:md"]
description = "Check markdown / MDX files for linting issues"
run = "rumdl check --fix"

[tasks.update]
description = "Update bun dependencies and reinstall with isolated linker"
run = ["bun update", "bun i --linker=isolated", "mise deps"]

[deps.bun]
auto = true

[hooks]
enter = ["mise upgrade -q", "mise deps -q"]

[settings]
experimental = true
